# WordOps Multi-tenancy Plugin Configuration
#
# This file configures the WordPress multi-tenancy plugin for WordOps
# Values below are this fork's packaged defaults and example sources
#

[multitenancy]

### Enable the multi-tenancy plugin
enable_plugin = true

### Shared WordPress infrastructure root directory
shared_root = /var/www/shared

### Number of old releases to keep for rollback
keep_releases = 3

### Default PHP version for new sites (7.4, 8.0, 8.1, 8.2, 8.3, 8.4)
php_version = 8.4

### WordPress core version: 'latest' or an exact version like 6.5.2; also accepts 'nightly'
wp_version = 7.0

### Default admin email for new WordPress sites
admin_email = admin@example.com

### Baseline plugins (downloaded from wordpress.org into shared wp-content)
baseline_plugins = nginx-helper,woocommerce,plausible-analytics,safe-svg

### Default theme for all sites
baseline_theme = woodmart-child

### Minimum free disk space (GB) for the health check
min_free_space_gb = 2

# GitHub/URL plugin and theme sources go in [github_plugins]/[github_themes]/
# [url_plugins]/[url_themes] below. Keep all [multitenancy] keys above them.

[github_plugins]
object-cache-pro = alnaggar-dev/object-cache-pro,branch,main
woodmart-core = alnaggar-dev/woodmart-core,branch,main

[github_themes]
woodmart = alnaggar-dev/woodmart,branch,main
woodmart-child = alnaggar-dev/woodmart-child,branch,main
