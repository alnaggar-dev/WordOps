# WordOps Multi-tenancy Plugin Configuration
#
# This file is the packaged/operator source catalog and fallback for
# multi-tenancy infrastructure settings and plugin/theme downloads. Plugin
# activation, active theme, CLI-added source metadata, and fleet-wide WordPress
# options live in /var/www/shared/config/baseline.json.
#

[multitenancy]

### Enable the multi-tenancy plugin
enable_plugin = true

### Shared WordPress infrastructure root directory
shared_root = /var/www/shared

### Number of old releases to keep for rollback
keep_releases = 3

### Number of asset backups kept per plugin/theme under backups/assets/ (0 = none)
keep_asset_backups = 3

### Default PHP version for new sites (7.4, 8.0, 8.1, 8.2, 8.3, 8.4)
php_version = 8.4

### WordPress core version: 'latest' or an exact version like 6.5.2; also accepts 'nightly'
wp_version = 7.0.2

### Default admin email for new WordPress sites
admin_email = admin@example.com

### Minimum free disk space (GB) for the health check
min_free_space_gb = 2
# --------------------------------------------------------------------------
# Fleet backups to Cloudflare R2 (restic). All keys optional; defaults shown.
# Secrets (R2 keys, RESTIC_PASSWORD) live in /etc/wo/backup.env (0600), never
# here. Scalar sections must stay above the plugin/theme source sections.
# --------------------------------------------------------------------------
#[backup]
### Master switch for scheduled backups (cron is removed when false)
#enable_backup = true
### Hourly per-tenant DB dumps run at this minute
#db_schedule_minute = 7
### Daily files snapshot (HH:MM), followed by retention/forget
#files_schedule = 03:10
### Weekly forget --prune (Day HH:MM)
#prune_schedule = Sun 04:00
### Monthly metadata-only restic check (day-of-month HH:MM)
#check_schedule = 1 05:00
### Retention: hourly,daily,weekly,monthly counts per family
#keep_db = 24h,7d,4w,3m
#keep_files = 7d,4w,6m
### Forget a deleted tenant's snapshots this long after deletion
#deleted_tenant_grace = 30d
### Optional healthchecks.io-style dead-man URLs, one per job
#db_ping_url =
#files_ping_url =
#prune_ping_url =
#check_ping_url =

# Packaged/operator plugin and theme download sources go in [wordpress_plugins],
# [wordpress_themes], [github_plugins]/[github_themes], and [url_plugins]/[url_themes]
# below. CLI-added sources are persisted to baseline metadata.

[wordpress_plugins]
nginx-helper = latest
woocommerce = 10.9.4
safe-svg = latest

[wordpress_themes]
# WordPress.org theme downloads use slug = version, for example:
# twentytwentyfour = latest
