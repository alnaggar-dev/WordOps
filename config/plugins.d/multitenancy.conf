# WordOps Multi-tenancy Plugin Configuration
#
# This file configures WordOps multi-tenancy infrastructure settings and
# download sources only. Plugin activation, active theme, and fleet-wide
# WordPress options live in /var/www/shared/config/baseline.json.
# Values below are this fork's packaged defaults and example sources.
#

[multitenancy]

### Enable the multi-tenancy plugin
enable_plugin = true

### Shared WordPress infrastructure root directory
shared_root = /var/www/shared

### Number of old releases to keep for rollback
keep_releases = 3

### Default PHP version for new sites (7.4, 8.0, 8.1, 8.2, 8.3, 8.4)
php_version = 8.4

### WordPress core version: 'latest' or an exact version like 6.5.2; also accepts 'nightly'
wp_version = 7.0

### Default admin email for new WordPress sites
admin_email = admin@example.com

### Minimum free disk space (GB) for the health check
min_free_space_gb = 2

# Plugin and theme download sources go in [wordpress_plugins],
# [wordpress_themes], [github_plugins]/[github_themes], and
# [url_plugins]/[url_themes] below. Keep all [multitenancy] keys above them.

[wordpress_plugins]
nginx-helper = latest
woocommerce = latest
plausible-analytics = latest
safe-svg = latest

[wordpress_themes]
# WordPress.org theme downloads use slug = version, for example:
# twentytwentyfour = latest
# This packaged fork sources woodmart and woodmart-child from [github_themes],
# so this section intentionally has no active keys.

[github_plugins]
object-cache-pro = alnaggar-dev/object-cache-pro,branch,main
woodmart-core = alnaggar-dev/woodmart-core,branch,main

[github_themes]
woodmart = alnaggar-dev/woodmart,branch,main
woodmart-child = alnaggar-dev/woodmart-child,branch,main
